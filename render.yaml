services:
  - type: web
    name: projeto-posto-combustivel
    env: docker
    plan: free
    rootDir: backend-java
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:3001,http://localhost:5173"
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: "https://*.vercel.app"
