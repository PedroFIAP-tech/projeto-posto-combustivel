server.port=${PORT:8080}

spring.application.name=posto-backend-java
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/posto_combustivel}
spring.datasource.username=${DATABASE_USERNAME:admin}
spring.datasource.password=${DATABASE_PASSWORD:posto123}
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:dev-secret-change-this-value-to-a-long-production-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:3000,http://localhost:5173}
